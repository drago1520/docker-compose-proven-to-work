services:
  mongodb:
    image: mongo:latest
    container_name: acme-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: acme-website
    volumes:
      - ./mongodb_data:/data/db
    restart: unless-stopped