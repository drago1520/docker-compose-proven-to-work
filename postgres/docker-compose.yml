services:
  postgres:
      image: postgres:17-alpine
      container_name: acme-postgres
      ports:
        - "15432:5432"
      environment:
        - POSTGRES_DB=acme-website
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
      volumes:
        - ./postgres_data:/var/lib/postgresql/data
      restart: unless-stopped